[platformio]

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  PubSubClient@^2.8
  ArduinoJson@^6.21
  DHT sensor library@^1.4
build_flags =
  -DCORE_DEBUG_LEVEL=0

; ─────────────────────────────────────────────────────────────────────────────
; ENV: sensor_esp32 (HiveMQ Cloud — use for demo/hackathon)
; Flash: pio run -e sensor_esp32
; ─────────────────────────────────────────────────────────────────────────────
[env:sensor_esp32]
board_build.partitions = huge_app.csv
build_src_filter = +<*.cpp> -<pump_esp32.cpp>
build_flags =
  ${env.build_flags}
  -DDEVICE_CODE=\"SENSOR_001\"
  -DWIFI_SSID=\"P108A\"
  -DWIFI_PASSWORD=\"88888888\"
  -DMQTT_BROKER=\"YOUR_BROKER.s1.eu.hivemq.cloud\"
  -DMQTT_PORT=8883
  -DMQTT_USERNAME=\"YOUR_MQTT_USER\"
  -DMQTT_PASSWORD=\"YOUR_MQTT_PASS\"
  -DMQTT_USE_TLS

; ─────────────────────────────────────────────────────────────────────────────
; ENV: sensor_esp32_local (Local Mosquitto — for development/testing)
; Flash: pio run -e sensor_esp32_local
;
; Prerequisites:
;   1. Install Mosquitto: https://mosquitto.org/download/
;      Or run in Docker: docker run -it -p 1883:1883 -p 9001:9001 eclipse-mosquitto
;   2. Edit mosquitto.conf (see below) — allow anonymous or add auth
;   3. Start broker: mosquitto -c mosquitto.conf
;
; mosquitto.conf minimal config:
;   listener 1883
;   allow_anonymous true
; ─────────────────────────────────────────────────────────────────────────────
[env:sensor_esp32_local]
board_build.partitions = huge_app.csv
build_src_filter = +<*.cpp> -<pump_esp32.cpp>
build_flags =
  ${env.build_flags}
  -DDEVICE_CODE=\"SENSOR_001\"
  -DWIFI_SSID=\"P108A\"
  -DWIFI_PASSWORD=\"88888888\"
  -DMQTT_BROKER=\"192.168.1.9\"     ; <-- your PC's LAN IP
  -DMQTT_PORT=1883
  -DMQTT_USERNAME=\"guest\"
  -DMQTT_PASSWORD=\"guest\"

; ─────────────────────────────────────────────────────────────────────────────
; ENV: pump_esp32 (HiveMQ Cloud — use for demo/hackathon)
; Flash: pio run -e pump_esp32
; ─────────────────────────────────────────────────────────────────────────────
[env:pump_esp32]
board_build.partitions = huge_app.csv
build_src_filter = +<*.cpp> -<sensor_esp32.cpp>
build_flags =
  ${env.build_flags}
  -DDEVICE_CODE=\"PUMP_001\"
  -DWIFI_SSID=\"P108A\"
  -DWIFI_PASSWORD=\"88888888\"
  -DMQTT_BROKER=\"YOUR_BROKER.s1.eu.hivemq.cloud\"
  -DMQTT_PORT=8883
  -DMQTT_USERNAME=\"YOUR_MQTT_USER\"
  -DMQTT_PASSWORD=\"YOUR_MQTT_PASS\"
  -DMQTT_USE_TLS

; ─────────────────────────────────────────────────────────────────────────────
; ENV: pump_esp32_local (Local Mosquitto — for development/testing)
; Flash: pio run -e pump_esp32_local
; ─────────────────────────────────────────────────────────────────────────────
[env:pump_esp32_local]
board_build.partitions = huge_app.csv
build_src_filter = +<*.cpp> -<sensor_esp32.cpp>
build_flags =
  ${env.build_flags}
  -DDEVICE_CODE=\"PUMP_001\"
  -DWIFI_SSID=\"P108A\"
  -DWIFI_PASSWORD=\"88888888\"
  -DMQTT_BROKER=\"192.168.1.9\"     ; <-- your PC's LAN IP
  -DMQTT_PORT=1883
  -DMQTT_USERNAME=\"guest\"
  -DMQTT_PASSWORD=\"guest\"

; ─────────────────────────────────────────────────────────────────────────────
; ENV: sensor_esp32_test (debug build)
; ─────────────────────────────────────────────────────────────────────────────
[env:sensor_esp32_test]
extends = env.sensor_esp32
build_type = debug