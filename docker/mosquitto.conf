# SmartGarden Mosquitto Configuration
#
# ── Local development (run directly on your PC):
#   mosquitto -c mosquitto.conf
#
# ── Docker:
#   docker run -it -p 1883:1883 -p 9001:9001 \
#     -v $(pwd)/mosquitto.conf:/mosquitto/config/mosquitto.conf \
#     eclipse-mosquitto mosquitto -c /mosquitto/config/mosquitto.conf

# ── Network ──────────────────────────────────────────────────────────────────
listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

# ── Persistence ──────────────────────────────────────────────────────────────
persistence true
persistence_location ./mosquitto_data/

# ── Logging ──────────────────────────────────────────────────────────────────
log_dest stdout
log_dest file ./mosquitto.log
log_type error
log_type warning
log_type notice
# log_type information  # verbose — disable for clean output

# ── Security ─────────────────────────────────────────────────────────────────
# Local dev: anonymous access enabled
# For production: set allow_anonymous false and use passwords
allow_anonymous true

# ── Limits ───────────────────────────────────────────────────────────────────
max_keepalive 120
max_connections -1