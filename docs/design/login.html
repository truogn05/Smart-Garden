<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verdant IoT - Smart Garden Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-container": "#92b88a",
                      "on-secondary-container": "#773318",
                      "tertiary": "#113211",
                      "primary-fixed-dim": "#b0cdbb",
                      "surface-container-low": "#f6f3ed",
                      "surface": "#fbf9f3",
                      "on-secondary-fixed-variant": "#763217",
                      "error": "#ba1a1a",
                      "on-primary-container": "#98b5a3",
                      "primary-container": "#2d4739",
                      "tertiary-fixed-dim": "#aad1a1",
                      "primary": "#173124",
                      "on-primary-fixed-variant": "#324c3e",
                      "surface-variant": "#e4e2dc",
                      "secondary-fixed-dim": "#ffb59b",
                      "error-container": "#ffdad6",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "on-surface": "#1b1c18",
                      "on-tertiary-fixed": "#012103",
                      "on-primary-fixed": "#062014",
                      "inverse-on-surface": "#f3f1eb",
                      "on-background": "#1b1c18",
                      "surface-container": "#f0eee8",
                      "surface-container-highest": "#e4e2dc",
                      "on-error-container": "#93000a",
                      "on-secondary": "#ffffff",
                      "on-secondary-fixed": "#380d00",
                      "inverse-primary": "#b0cdbb",
                      "surface-bright": "#fbf9f3",
                      "background": "#fbf9f3",
                      "secondary": "#94492c",
                      "secondary-container": "#fe9d7a",
                      "secondary-fixed": "#ffdbcf",
                      "outline": "#727973",
                      "inverse-surface": "#30312d",
                      "primary-fixed": "#ccead6",
                      "surface-dim": "#dcdad4",
                      "surface-tint": "#496455",
                      "on-error": "#ffffff",
                      "on-surface-variant": "#424844",
                      "tertiary-container": "#284925",
                      "on-tertiary-fixed-variant": "#2d4e2a",
                      "tertiary-fixed": "#c5edbb",
                      "on-primary": "#ffffff",
                      "outline-variant": "#c2c8c2",
                      "surface-container-high": "#eae8e2"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "32px",
                      "unit": "8px",
                      "container-padding-mobile": "24px",
                      "section-gap": "80px",
                      "container-padding-desktop": "48px"
              },
              "fontFamily": {
                      "data-display": ["Geist"],
                      "body-lg": ["Geist"],
                      "headline-lg-mobile": ["Playfair Display"],
                      "headline-md": ["Playfair Display"],
                      "headline-lg": ["Playfair Display"],
                      "body-md": ["Geist"],
                      "label-md": ["Geist"],
                      "display-lg": ["Playfair Display"]
              },
              "fontSize": {
                      "data-display": ["36px", {"lineHeight": "1.0", "letterSpacing": "-0.03em", "fontWeight": "300"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]
              }
            },
          },
        }
      </script>
</head>
<body class="bg-surface font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Background Layer: High-end Botanical Canvas -->
<div class="fixed inset-0 z-0 overflow-hidden">
<img class="w-full h-full object-cover opacity-80" data-alt="A serene and ethereal wide-angle shot of a misty garden at dawn. Soft, diffused morning light filters through delicate fern leaves and dew-covered foliage, creating a tranquil Zen atmosphere. The color palette is dominated by muted sage greens, silvery teals, and soft parchment whites. The depth of field is shallow, creating a beautiful bokeh effect that emphasizes the organic, peaceful morning stillness." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWuDWhtJjMXOpyU-cya4ETCOHS3XAL9vx6R-PeO7NMCQSlo5jVdBZT2FbLvbYG7m4qC6AvnKJoVv_FKX_0lwPmqtrcCOAk3n3TmkMAo6PYc69TTUGmC6jWuR4Ooy4FrUI-KnvOjdGX2rDJHc_tLnzHqi-4XlWr8_SH0q7-K4H4P_BOqUbBnyBoJfEEGRUzAb2YyPCtASUjCJ9qZF0kyDGKWLDQwvcn0JTpzLCP2P5rCW8vWmfJknO2IgJaR9umhlhhcSIj4ZBksXjN"/>
<!-- Overlay Gradient for Depth -->
<div class="absolute inset-0 bg-gradient-to-tr from-surface/40 via-transparent to-surface-container-low/30"></div>
</div>
<!-- Main Content Shell -->
<main class="relative z-10 min-h-screen flex items-center justify-center px-container-padding-mobile md:px-container-padding-desktop">
<!-- Login Card: Glassmorphism Bento-style Card -->
<div class="w-full max-w-md">
<div class="glass-panel bg-surface/60 border border-surface-container-highest/50 rounded-xl shadow-[0_30px_60px_-15px_rgba(23,49,36,0.1)] p-8 md:p-12 transition-all duration-500">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-6 shadow-lg">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="nature">nature</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary text-center mb-2">Verdant IoT</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center italic">"Welcome to your garden. Tend with intention."</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface/40 border-b-2 border-outline-variant focus:border-primary focus:bg-surface-container-low/60 rounded-t-lg outline-none transition-all duration-300 font-body-md text-body-md placeholder:text-outline/50" id="email" name="email" placeholder="name@garden.io" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface/40 border-b-2 border-outline-variant focus:border-primary focus:bg-surface-container-low/60 rounded-t-lg outline-none transition-all duration-300 font-body-md text-body-md placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Keep me rooted</span>
</label>
<a class="font-label-md text-label-md text-secondary hover:text-on-secondary-container transition-colors underline-offset-4 hover:underline" href="#">Forgot?</a>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-label-md text-label-md shadow-lg shadow-primary/10 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 uppercase tracking-widest" type="submit">
                            Enter Greenhouse
                        </button>
<div class="relative flex items-center justify-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-md text-label-md text-outline/60 uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<button class="w-full flex items-center justify-center space-x-3 bg-surface-container-lowest border border-outline-variant/50 text-on-surface py-4 rounded-full font-label-md text-label-md hover:bg-surface-container-high hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 uppercase tracking-widest" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Google Sign In</span>
</button>
</div>
</form>
<!-- Footer Navigation -->
<div class="mt-12 pt-8 border-t border-outline-variant/20 text-center">
<p class="font-label-md text-label-md text-on-surface-variant">
                        New to the ecosystem? 
                        <a class="text-primary font-bold hover:text-secondary ml-1 transition-colors" href="#">Apply for Access</a>
</p>
</div>
</div>
<!-- Soft Botanical Chip for Environment Info -->
<div class="mt-8 flex justify-center space-x-4">
<div class="bg-surface-container-low/60 backdrop-blur-md px-4 py-2 rounded-full border border-outline-variant/30 flex items-center space-x-2">
<span class="material-symbols-outlined text-primary text-sm" data-icon="cloud">cloud</span>
<span class="font-label-md text-label-md text-on-surface-variant">Systems Nominal</span>
</div>
<div class="bg-surface-container-low/60 backdrop-blur-md px-4 py-2 rounded-full border border-outline-variant/30 flex items-center space-x-2">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="public">public</span>
<span class="font-label-md text-label-md text-on-surface-variant">v2.4.1 Botanical</span>
</div>
</div>
</div>
</main>
<!-- Floating Help Button (Subtle Glassmorphism) -->
<div class="fixed bottom-gutter right-gutter z-20">
<button class="w-14 h-14 bg-surface/80 backdrop-blur-xl border border-outline-variant/30 rounded-full flex items-center justify-center text-primary shadow-lg hover:scale-110 active:scale-95 transition-all group">
<span class="material-symbols-outlined text-[28px] group-hover:rotate-12 transition-transform" data-icon="help_center">help_center</span>
</button>
</div>
</body></html>
